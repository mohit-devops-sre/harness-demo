pipeline:
  identifier: Build_mohit_devops_sre_harness_demo_1773468301302
  name: Build harness-demo
  orgIdentifier: default
  projectIdentifier: Harness_Demo
  properties:
    ci:
      codebase:
        build: <+input>
        connectorRef: account.Github_OAuth_1773468260195
        repoName: mohit-devops-sre/harness-demo
  stages:
    - stage:
        identifier: build
        name: build
        spec:
          caching:
            enabled: true
          cloneCodebase: true
          execution:
            steps:
              - step:
                  identifier: runlinter
                  name: run linter
                  spec:
                    command: |-
                      pip install flake8
                      flake8 .
                  timeout: ""
                  type: Run
              - step:
                  identifier: setupvirtualenvironment
                  name: setup virtual environment
                  spec:
                    command: |-
                      python3 -m venv .venv
                      . .venv/bin/activate
                      python3 -m pip install -r requirements.txt
                      python3 -m pip install -e .
                  timeout: ""
                  type: Run
              - step:
                  identifier: buildandpushtoartifactory
                  name: Build and Push to Artifactory
                  spec:
                    caching: true
                    connectorRef: jfrog_artifactory
                    host: trialclp5ro.jfrog.io
                    repo: harness-demo-docker/harness-demo
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: ./Dockerfile
                  timeout: ""
                  type: BuildAndPushDockerRegistry
          platform:
            arch: Amd64
            os: Linux
          runtime:
            spec: {}
            type: Cloud
        type: CI
