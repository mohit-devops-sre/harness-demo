pipeline:
  identifier: Build_mohit_devops_sre_harness_demo_1773468301302
  name: Build harness-demo
  orgIdentifier: default
  projectIdentifier: Harness_Demo
  properties:
    ci:
      codebase:
        build: <+input>
        connectorRef: account.Github_OAuth_1773468260195
        repoName: mohit-devops-sre/harness-demo
  stages:
    - stage:
        identifier: build
        name: build
        spec:
          caching:
            enabled: false
          cloneCodebase: true
          execution:
            steps:
              - step:
                  identifier: runlinter
                  name: run linter
                  spec:
                    command: |-
                      pip install flake8
                      flake8 --ignore=E302,E305,W292 .
                  timeout: ""
                  type: Run
              - step:
                  identifier: setupvirtualenvironment
                  name: setup virtual environment
                  spec:
                    command: |-
                      python3 -m venv .venv
                      . .venv/bin/activate
                      python3 -m pip install -r requirements.txt
                  timeout: ""
                  type: Run
              - step:
                  identifier: debugauth
                  name: Debug Auth Check
                  spec:
                    connectorRef: jfrogconnector
                    command: |-
                      echo "=== Testing Docker Login with Connector Creds ==="
                      echo "PLUGIN_REGISTRY: $PLUGIN_REGISTRY"
                      echo "PLUGIN_USERNAME: $PLUGIN_USERNAME"
                      echo "=== Attempting login ==="
                      docker login $PLUGIN_REGISTRY -u $PLUGIN_USERNAME -p $PLUGIN_PASSWORD && echo "LOGIN SUCCESS" || echo "LOGIN FAILED"
                      echo "=== Attempting push ==="
                      docker pull hello-world
                      docker tag hello-world $PLUGIN_REGISTRY/harness-demo-docker/harness-demo:authtest
                      docker push $PLUGIN_REGISTRY/harness-demo-docker/harness-demo:authtest && echo "PUSH SUCCESS" || echo "PUSH FAILED"
                  timeout: ""
                  type: Run
              - step:
                  identifier: buildandpushtoartifactory
                  name: Build and Push to Artifactory
                  spec:
                    caching: true
                    connectorRef: jfrogconnector
                    repo: harness-demo-docker/harness-demo
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: ./Dockerfile
                  timeout: ""
                  type: BuildAndPushDockerRegistry
          platform:
            arch: Amd64
            os: Linux
          runtime:
            spec: {}
            type: Cloud
        type: CI
