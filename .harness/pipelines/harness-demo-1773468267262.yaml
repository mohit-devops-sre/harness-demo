pipeline:
  identifier: Build_mohit_devops_sre_harness_demo_1773468301302
  name: Build harness-demo
  orgIdentifier: default
  projectIdentifier: Harness_Demo
  properties:
    ci:
      codebase:
        build: <+input>
        connectorRef: account.Github_OAuth_1773468260195
        repoName: mohit-devops-sre/harness-demo
  stages:
    - stage:
        identifier: build
        name: build
        spec:
          caching:
            enabled: false
          cloneCodebase: true
          execution:
            steps:
              - step:
                  identifier: runlinter
                  name: run linter
                  spec:
                    command: |-
                      pip install flake8
                      flake8 --ignore=E302,E305,W292 .
                  timeout: ""
                  type: Run
              - step:
                  identifier: setupvirtualenvironment
                  name: setup virtual environment
                  spec:
                    command: |-
                      python3 -m venv .venv
                      . .venv/bin/activate
                      python3 -m pip install -r requirements.txt
                  timeout: ""
                  type: Run
              - step:
                  identifier: debugdocker
                  name: Debug Docker Push
                  spec:
                    command: |-
                      echo "=== Debug Docker Info ==="
                      echo "Registry: trialclp5ro.jfrog.io"
                      echo "Repo: harness-demo-docker/harness-demo"
                      echo "Full push path: trialclp5ro.jfrog.io/harness-demo-docker/harness-demo:latest"
                      echo ""
                      echo "=== Testing Docker Login ==="
                      docker login trialclp5ro.jfrog.io -u $JFROG_USER -p $JFROG_PASS || echo "LOGIN FAILED"
                      echo ""
                      echo "=== Manual Push Test ==="
                      docker pull hello-world
                      docker tag hello-world trialclp5ro.jfrog.io/harness-demo-docker/harness-demo:test
                      docker push trialclp5ro.jfrog.io/harness-demo-docker/harness-demo:test || echo "PUSH FAILED"
                    envVariables:
                      JFROG_USER: your_jfrog_username
                      JFROG_PASS: your_jfrog_token
                  timeout: ""
                  type: Run
              - step:
                  identifier: buildandpushtoartifactory
                  name: Build and Push to Artifactory
                  spec:
                    connectorRef: account.harnessImage
                    repo: harness-demo-docker/harness-demo
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    caching: true
                    dockerfile: ./Dockerfile
                  timeout: ""
                  type: BuildAndPushDockerRegistry
          platform:
            arch: Amd64
            os: Linux
          runtime:
            spec: {}
            type: Cloud
        type: CI
