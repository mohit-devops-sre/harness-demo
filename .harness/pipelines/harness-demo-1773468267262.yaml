pipeline:
  identifier: Build_mohit_devops_sre_harness_demo_1773468301302
  name: Build harness-demo
  orgIdentifier: default
  projectIdentifier: Harness_Demo
  properties:
    ci:
      codebase:
        build: <+input>
        connectorRef: account.Github_OAuth_1773468260195
        repoName: mohit-devops-sre/harness-demo
  stages:
    - stage:
        identifier: build
        name: Build
        spec:
          caching:
            enabled: false
            paths: []
          cloneCodebase: true
          execution:
            steps:
              - step:
                  identifier: runlinter
                  name: run linter stage
                  spec:
                    command: |-
                      pip install flake8
                      flake8 --ignore=E302,E305,W292 .
                  timeout: ""
                  type: Run
              - step:
                  identifier: setupvirtualenvironment
                  name: setup virtual environment
                  spec:
                    command: |-
                      python3 -m venv .venv
                      . .venv/bin/activate
                      python3 -m pip install -r requirements.txt
                  timeout: ""
                  type: Run
              - step:
                  identifier: buildandpushtoartifactory
                  name: Build and Push to Artifactory
                  spec:
                    caching: true
                    connectorRef: jfrogconnector
                    repo: trialclp5ro.jfrog.io/harness-demo-docker/harness-demo
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: ./Dockerfile
                    buildArgs:
                      DOCKER_BUILDKIT: "1"
                    platform:
                      os: Linux
                      arch: Arm64
                  timeout: ""
                  type: BuildAndPushDockerRegistry
          platform:
            arch: Arm64
            os: Linux
          runtime:
            spec: {}
            type: Cloud
          buildIntelligence:
            enabled: false
        type: CI
        description: ""
    - stage:
        name: Canary Deploy
        identifier: Canary_Deploy
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: harness_demo
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: <+input>
                      sources: <+input>
          environment:
            environmentRef: Demo_Env
            deployToAll: false
            infrastructureDefinitions:
              - identifier: minikube
          execution:
            steps:
              - stepGroup:
                  name: Canary Deployment
                  identifier: canaryDeployment
                  steps:
                    - step:
                        name: Canary Deployment
                        identifier: canaryDeployment
                        type: K8sCanaryDeploy
                        timeout: 10m
                        spec:
                          instanceSelection:
                            type: Count
                            spec:
                              count: 1
                          skipDryRun: false
                    - step:
                        name: Canary Delete
                        identifier: canaryDelete
                        type: K8sCanaryDelete
                        timeout: 10m
                        spec: {}
              - step:
                  type: HarnessApproval
                  name: Harness Approval
                  identifier: Harness_Approval
                  spec:
                    approvalMessage: Please review the following information and approve the pipeline progression
                    includePipelineExecutionHistory: true
                    isAutoRejectEnabled: false
                    approvers:
                      userGroups:
                        - _project_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs: []
                  timeout: 1d
              - stepGroup:
                  name: Primary Deployment
                  identifier: primaryDeployment
                  steps:
                    - step:
                        name: Rolling Deployment
                        identifier: rollingDeployment
                        type: K8sRollingDeploy
                        timeout: 10m
                        spec:
                          skipDryRun: false
            rollbackSteps:
              - step:
                  name: Canary Delete
                  identifier: rollbackCanaryDelete
                  type: K8sCanaryDelete
                  timeout: 10m
                  spec: {}
              - step:
                  name: Rolling Rollback
                  identifier: rollingRollback
                  type: K8sRollingRollback
                  timeout: 10m
                  spec: {}
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
